interface:
  display_name: "Movie Resource Search"
  short_description: "Search media titles, return PanSou links, and save Quark shares into the user's cloud drive"
  default_prompt: "Use $movie-search-and-download to search PanSou and return a relevance-ranked Markdown table with clickable provider links, extraction codes, and optional link-check status. Before Quark save, OpenList verification, or NAS/SMB copy on a fresh install, run npm run check-env and use .env defaults when the user omits paths. When saving a Quark share, preview it first, reason from context to decide the canonical resource name and whether it is a series, then pass that Agent decision to scripts/quark-save.mjs with --context-name, --resource-type, and optional --rename-plan-json. When verifying through OpenList, always list the target path with refresh:true. For NAS/SMB backups, tell the user the source path, exact object, destination path, and final naming before using OpenList fs/copy; poll the copy task and verify with refresh:true. For NAS/server downloads where copy is not suitable, use OpenList offline download or a server-side raw_url download, not browser download."
policy:
  allow_implicit_invocation: true
