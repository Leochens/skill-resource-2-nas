interface:
  display_name: "Resource 2 NAS"
  short_description: "Search media resources, save Quark or Baidu shares, and copy saved resources to OpenList/NAS storage"
  default_prompt: "Use $resource-2-nas for media search, Quark/Baidu cloud saves, OpenList verification, and NAS/SMB copies. For delegated sub-agent work, read SUBAGENT.md and prefer JSON tools. Search defaults to Baidu/Quark and returns the top 50 ranked links after filtering. On fresh installs run npm run check-env -- --json and npm run check-cookies; continue real cloud saves only when check-cookies.nextAction is ready. Cloud saves must follow preview -> confirmation -> --yes save; pass Agent-decided --context-name and --resource-type. Before OpenList fs/copy, report source, exact object, destination, and final naming, then poll and verify with refresh:true. Never print or persist Cookies/Tokens."
policy:
  allow_implicit_invocation: true
