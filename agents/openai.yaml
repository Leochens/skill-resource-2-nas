interface:
  display_name: "Resource 2 NAS"
  short_description: "Search media resources, save Quark or Baidu shares, and copy saved resources to OpenList/NAS storage"
  default_prompt: "Use $resource-2-nas for media search, Quark/Baidu cloud saves, OpenList verification, and NAS/SMB copies. For delegated sub-agent work, read SUBAGENT.md and prefer JSON tools. Search defaults to Baidu/Quark and returns the top 50 ranked links after filtering. On fresh installs run npm run check-ready; continue real saves/copies only when check-ready.nextAction is ready. Quark and Baidu are alternatives, so one valid provider is enough; Quark targets may be /备份资源 paths or full folder URLs. Cloud saves must follow preview -> confirmation -> --yes save; pass Agent-decided --context-name and --resource-type. Before OpenList fs/copy, report source, exact object, destination, and final naming, then poll and verify with refresh:true. Never print or persist Cookies/Tokens."
policy:
  allow_implicit_invocation: true
